<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recetas - Sabores Deliciosos</title>

    <!-- Estilos -->
    <link rel="stylesheet" href="/sabores_deliciosos/css/index.css">
    <link rel="stylesheet" href="/sabores_deliciosos/css/recipes.css">
</head>

<body>

<header class="header">
    <div class="header-content">
        <a href="/index.html" class="logo">🍳 Sabores Deliciosos</a>
        <nav class="nav">
            <ul class="nav-list">
                <li><a href="/index.html">Inicio</a></li>
                <li><a href="/sabores_deliciosos/html/recipes.html" class="active">Recetas</a></li>
                <li><a href="/sabores_deliciosos/html/addRecipe.html">Agregar</a></li>
                <li><a href="/sabores_deliciosos/html/contact.html">Contacto</a></li>
            </ul>
        </nav>
    </div>
</header>

<main class="main">
    <h1 class="page-title">🍳 Recetas Guardadas</h1>
    <div id="recipesContainer" class="recipes-container"></div>
</main>

<footer class="footer">
    <p class="footer-bottom">© 2026 Sabores Deliciosos</p>
</footer>

<!-- Script para mostrar recetas -->
<script type="module">
    import { getRecipes } from '/sabores_deliciosos/js/recipes.js';

    const container = document.getElementById("recipesContainer");
    const recipes = getRecipes();

    if (recipes.length === 0) {
        container.innerHTML = "<p>No hay recetas guardadas aún.</p>";
    } else {
        container.innerHTML = recipes.map(recipe => `
            <div class="recipe-card">
                <img src="${recipe.image}" alt="${recipe.title}" class="recipe-image">
                <h2>${recipe.title}</h2>
                <p><strong>Categoría:</strong> ${recipe.category}</p>
                <p><strong>Tiempo:</strong> ${recipe.time}</p>
                <p><strong>Porciones:</strong> ${recipe.servings}</p>
                <p><strong>Calorías:</strong> ${recipe.calories}</p>
                <p><strong>Ingredientes:</strong><br>${recipe.ingredients.join("<br>")}</p>
                <p><strong>Pasos:</strong><br>${recipe.steps.join("<br>")}</p>
                <p>${recipe.description}</p>
            </div>
        `).join("");
    }
</script>

</body>
</html>
