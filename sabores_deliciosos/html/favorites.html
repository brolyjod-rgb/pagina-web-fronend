<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favoritos - Sabores Deliciosos</title>

    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="/sabores_deliciosos/css/favorites.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="header-content">

            <a href="/index.html" class="logo">
                <span class="logo-icon">🍳</span> Sabores Deliciosos
            </a>

            <nav class="nav">
                <ul class="nav-list">
                    <li><a href="/index.html">Inicio</a></li>
                    <li><a href="/sabores_deliciosos/html/recipes.html">Recetas</a></li>
                    <li><a href="/sabores_deliciosos/html/addRecipe.html">Agregar</a></li>
                    <li><a href="/sabores_deliciosos/html/contact.html">Contacto</a></li>
                </ul>
            </nav>

        </div>
    </header>

    <!-- MAIN -->
    <main class="main">

        <div class="page-header">
            <h1 class="page-title">❤️ Mis Favoritos</h1>
            <p class="page-subtitle">Tus recetas guardadas con amor</p>
        </div>

        <div class="favorites-container">

            <div class="favorites-header">
                <span class="favorites-count" id="favoritesCount">0 recetas favoritas</span>
            </div>

            <div class="recipes-grid" id="recipesGrid"></div>

            <!-- EMPTY STATE -->
            <div class="empty-state" id="emptyState" style="display:none">
                <div class="empty-state-icon">🍽️</div>
                <h2>Aún no tienes favoritos</h2>
                <p>Explora nuevas recetas y guarda tus favoritas</p>
                <a href="/sabores_deliciosos/html/recipes.html" class="btn-primary">🔍 Ver Recetas</a>
            </div>

        </div>

    </main>

    <!-- MODAL -->
    <div class="modal" id="recipeModal">

        <div class="modal-content">

            <button class="modal-close" onclick="closeModal()">×</button>

            <div class="modal-image-container">
                <img id="modalImage" class="modal-image">
            </div>

            <div class="modal-body">

                <span class="recipe-category" id="modalCategory"></span>
                <h2 id="modalTitle" class="modal-title"></h2>

                <div class="modal-meta">
                    <div class="modal-meta-item">⏱️ <span id="modalTime"></span></div>
                    <div class="modal-meta-item">👥 <span id="modalServings"></span></div>
                    <div class="modal-meta-item">🔥 <span id="modalCalories"></span></div>
                </div>

                <h3>📋 Ingredientes</h3>
                <ul id="modalIngredients" class="ingredients-list"></ul>

                <h3>👨‍🍳 Preparación</h3>
                <ol id="modalSteps" class="steps-list"></ol>

                <div class="modal-actions">
                    <button id="btnFavorite" class="btn-favorite">❤️ Agregar</button>
                    <button id="btnShare" class="btn-share">📤 Compartir</button>
                </div>

            </div>
        </div>

    </div>

    <!-- JS -->
    <script src="/sabores_deliciosos/js/recipesData.js"></script>
    <script src="/sabores_deliciosos/js/recipesUI.js"></script>
    <script src="/sabores_deliciosos/js/recipesFavorites.js"></script>
    <script src="/sabores_deliciosos/js/recipesApp.js"></script>

</body>
</html>
